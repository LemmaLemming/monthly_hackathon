<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Healthline Dispatcher Transcription Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-panel">
        <p class="eyebrow">Healthline Access</p>
        <h1>Dispatcher Sign-In</h1>
        <p class="login-copy">
          Sign in with the shared dispatcher credentials before opening the live translation console.
        </p>

        <form id="loginForm" class="login-form">
          <label class="login-field">
            <span class="toolbar-label">Username</span>
            <input id="usernameInput" name="username" type="text" autocomplete="username" required />
          </label>

          <label class="login-field">
            <span class="toolbar-label">Password</span>
            <input
              id="passwordInput"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </label>

          <button id="loginButton" type="submit" class="primary">Sign In</button>
          <p id="loginStatus" class="login-status" aria-live="polite">Sign in to continue.</p>
        </form>
      </section>
    </main>
    <script type="module" src="/login.js"></script>
  </body>
</html>
